name: Agent Scaffold
on:
  repository_dispatch:
    types: [agent-scaffold]

jobs:
  scaffold:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.AETHER_APP_ID }}
          private-key: ${{ secrets.AETHER_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"

      - name: Configure npm registry
        run: |
          echo "@lovelace-ai:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.NPM_TOKEN }}" >> .npmrc

      - name: Install dependencies
        run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run AI scaffold
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "You are scaffolding a new Aether project. Read DESIGN.md for the project vision and goals. Based on those goals, generate an initial set of Nuxt features/pages that bring the design to life. Read `.agents/skills/aether/SKILL.md` first and follow the patterns in the `aether` skill topics for architecture guidance. Focus on creating a working skeleton that demonstrates the core functionality described in DESIGN.md. Commit nothing — just write the files." --allowedTools Edit,Write,Read,Glob,Grep

      - name: Commit scaffolded code
        run: |
          git config user.name "aether-setup[bot]"
          git config user.email "aether-setup[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "[Aether] AI-generated initial scaffold from DESIGN.md"
          git push
